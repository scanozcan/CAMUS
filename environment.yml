# Conda environment for CAMUS, including a pinned MAGeCK from bioconda.
# Create with:  conda env create -f environment.yml
# Activate with: conda activate camus
name: camus
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - mageck=0.5.9.5      # official MAGeCK (Li et al., Genome Biology 2014)
  - pandas>=1.3
  - numpy>=1.21
  - pyyaml>=5.4
  - matplotlib>=3.4
  - seaborn>=0.11
  - pip
  - pip:
      - matplotlib-venn>=0.11
      - pytest>=7.0
      - -e .
